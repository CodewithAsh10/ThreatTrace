<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}VulnGuard{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            severity: {
              high: '#dc2626',
              medium: '#ea580c',
              low: '#ca8a04',
              info: '#2563eb'
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex flex-col">
  <nav class="bg-gray-900 border-b border-gray-800 px-6 py-3 flex items-center gap-3">
    <a href="/" class="flex items-center gap-2 text-xl font-bold text-green-400">
      <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20">
        <path d="M10 1c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9-4.03-9-9-9zm0 16c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/>
        <path d="M9 5h2v5H9V5zm0 7h2v2H9v-2z"/>
      </svg>
      VulnGuard
    </a>
    <div class="ml-auto flex gap-6 text-sm">
      <a href="/" class="hover:text-green-400 transition">Home</a>
      <a href="/history" class="hover:text-green-400 transition">History</a>
    </div>
  </nav>
  <main class="flex-1">
    {% block content %}{% endblock %}
  </main>
  <footer class="text-center text-xs text-gray-600 py-4 border-t border-gray-800">
    VulnGuard — Automated Web Vulnerability Scanner
  </footer>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  {% block scripts %}{% endblock %}
  <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>
</body>
</html>
